<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АТВСС Одсек Ниш - Сензори</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <div class="logos-container">
            <img src="Images/akademija.png" alt="Академија" class="logo akademija-logo">
            <img src="Images/appstim.png" alt="Апстим" class="logo appstim-logo">
        </div>
        
        <div class="sensor-data">
            <div class="location-info">
                <h2>Академија техничко-васпитачких струковних студија Ниш</h2>
            </div>

            <div class="metrics-grid">
                <!-- PM1 -->
                <div class="metric-card" id="pm1">
                    <h3>ПМ1</h3>
                    <div class="unit">μg/m³</div>
                    <div class="sensor-values">
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-smile"></i>
                                </div>
                            </div>
                        </div>
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-smile"></i>
                                </div>
                            </div>
                        </div>
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-smile"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- PM2.5 -->
                <div class="metric-card" id="pm25">
                    <h3>ПМ2.5</h3>
                    <div class="unit">μg/m³</div>
                    <div class="sensor-values">
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-smile"></i>
                                </div>
                            </div>
                        </div>
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-smile"></i>
                                </div>
                            </div>
                        </div>
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-smile"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- PM10 -->
                <div class="metric-card" id="pm10">
                    <h3>ПМ10</h3>
                    <div class="unit">μg/m³</div>
                    <div class="sensor-values">
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-smile"></i>
                                </div>
                            </div>
                        </div>
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-smile"></i>
                                </div>
                            </div>
                        </div>
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-smile"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Температура -->
                <div class="metric-card" id="temperature">
                    <h3>Температура</h3>
                    <div class="unit">°C</div>
                    <div class="sensor-values">
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-temperature-half"></i>
                                </div>
                            </div>
                        </div>
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-temperature-half"></i>
                                </div>
                            </div>
                        </div>
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-temperature-half"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Притисак -->
                <div class="metric-card" id="pressure">
                    <h3>Притисак</h3>
                    <div class="unit">hPa</div>
                    <div class="sensor-values">
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-compress-arrows-alt"></i>
                                </div>
                            </div>
                        </div>
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-compress-arrows-alt"></i>
                                </div>
                            </div>
                        </div>
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-compress-arrows-alt"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Влажност -->
                <div class="metric-card" id="humidity">
                    <h3>Влажност</h3>
                    <div class="unit">%</div>
                    <div class="sensor-values">
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-level"></div>
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-tint"></i>
                                </div>
                            </div>
                        </div>
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-level"></div>
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-tint"></i>
                                </div>
                            </div>
                        </div>
                        <div class="sensor-value">
                            <span class="sensor-location"></span>
                            <span class="sensor-data-value">0.00</span>
                            <div class="sensor-status">
                                <div class="danger-level"></div>
                                <div class="danger-indicator"></div>
                                <div class="status-icon">
                                    <i class="fas fa-tint"></i>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="last-update">
                Последње ажурирање: <span id="timestamp"></span>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
