<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grafovi senzora</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            background: radial-gradient(circle at center, #2c3e50, #1a1a2e);
            font-family: Arial, sans-serif;
            color: white;
        }
        .navbar {
            background: rgba(0, 0, 0, 0.3);
            padding: 1rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }
        .nav-container {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .nav-links {
            display: flex;
            gap: 20px;
        }
        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 5px;
            transition: background-color 0.3s;
        }
        .nav-links a:hover {
            background: rgba(255, 255, 255, 0.1);
        }
        .nav-links a.active {
            background: #3498db;
        }
        .menu-btn {
            display: none;
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        .container {
            max-width: 1600px;
            margin: 0 auto;
            padding: 20px;
        }
        .section {
            margin-bottom: 60px;
        }
        .section-title {
            text-align: center;
            color: #3498db;
            font-size: 28px;
            margin-bottom: 30px;
            padding: 15px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 8px;
        }
        .graf-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
        }
        .graf-box {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 10px;
            backdrop-filter: blur(5px);
        }
        h2 {
            margin-top: 0;
            margin-bottom: 20px;
            text-align: center;
            color: #3498db;
            font-size: 22px;
        }
        iframe {
            width: 100%;
            height: 300px;
            border: none;
            border-radius: 5px;
        }
        @media (max-width: 1200px) {
            .graf-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }
        @media (max-width: 768px) {
            .menu-btn {
                display: block;
            }
            .nav-links {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: rgba(0, 0, 0, 0.9);
                flex-direction: column;
                padding: 1rem;
            }
            .nav-links.show {
                display: flex;
            }
            .nav-links a {
                padding: 12px 20px;
            }
            .graf-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <button class="menu-btn">☰</button>
            <div class="nav-links">
                <a href="index.html">Odsek Nis</a>
                <a href="grafKvalitet.html">Kvalitet vazduha</a>
                <a href="grafVazduh.html" class="active">Temp,Pr,Hu</a>
                <a href="samsungLab.html">Samsung Lab</a>
            </div>
        </div>
    </nav>
    <div class="container">
        <div class="section">
            <h1 class="section-title">ATVSS ODSEK NIŠ</h1>
            <div class="graf-grid">
                <div class="graf-box">
                    <h2>Temperatura</h2>
                    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/q87EBfWGk/temperature-humidity-pressure?var-chipID=esp8266-9091332&var-type=BME280&var-query0=sensors&orgId=1&from=now-24h&to=now&timezone=browser&theme=dark&panelId=2&__feature.dashboardSceneSolo"></iframe>  
                </div>
                <div class="graf-box">
                    <h2>Pritisak</h2>
                    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/q87EBfWGk/temperature-humidity-pressure?var-chipID=esp8266-9091332&var-type=BME280&var-query0=sensors&orgId=1&from=now-24h&to=now&timezone=browser&theme=dark&panelId=3&__feature.dashboardSceneSolo"></iframe>
                </div>
                <div class="graf-box">
                    <h2>Vlaznost</h2>
                    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/q87EBfWGk/temperature-humidity-pressure?var-chipID=esp8266-9091332&var-type=BME280&var-query0=sensors&orgId=1&from=now-24h&to=now&timezone=browser&theme=dark&panelId=4&__feature.dashboardSceneSolo"></iframe>
                </div>
            </div>
        </div>

        <div class="section">
            <h1 class="section-title">Samsung Apps Lab</h1>
            <div class="graf-grid">
                <div class="graf-box">
                    <h2>Temperatura</h2>
                    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/q87EBfWGk/temperature-humidity-pressure?var-chipID=esp8266-16160069&var-type=BME280&var-query0=sensors&orgId=1&from=now-24h&to=now&timezone=browser&theme=dark&panelId=2&__feature.dashboardSceneSolo"></iframe>
                </div>
                <div class="graf-box">
                    <h2>Pritisak</h2>
                    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/q87EBfWGk/temperature-humidity-pressure?var-chipID=esp8266-16160069&var-type=BME280&var-query0=sensors&orgId=1&from=now-24h&to=now&timezone=browser&theme=dark&panelId=3&__feature.dashboardSceneSolo"></iframe>
                </div>
                <div class="graf-box">
                    <h2>Vlaznost</h2>
                    <iframe src="https://api-rrd.madavi.de:3000/grafana/d-solo/q87EBfWGk/temperature-humidity-pressure?var-chipID=esp8266-16160069&var-type=BME280&var-query0=sensors&orgId=1&from=now-24h&to=now&timezone=browser&theme=dark&panelId=4&__feature.dashboardSceneSolo"></iframe>
                </div>
            </div>
        </div>
    </div>
    <script>
        document.querySelector('.menu-btn').addEventListener('click', function() {
            document.querySelector('.nav-links').classList.toggle('show');
        });
    </script>
</body>
</html>
